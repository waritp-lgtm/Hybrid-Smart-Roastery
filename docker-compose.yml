version: '3.9'

services:
  # ─────────────────────────────────────────
  # PostgreSQL 16 + pgvector
  # ─────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: eight_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eight_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-eight_coffee}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ${NAS_BACKUP_PATH:-./docker/backups}:/backups
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eight_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eight_net

  # ─────────────────────────────────────────
  # Redis 7 (Cache + BullMQ Queue)
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: eight_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eight_net

  # ─────────────────────────────────────────
  # NestJS API (Port 4000)
  # ─────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: eight_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      LINE_CHANNEL_ID: ${LINE_CHANNEL_ID}
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET}
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN}
      LINE_ADMIN_GROUP_ID: ${LINE_ADMIN_GROUP_ID}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      FLASH_API_KEY: ${FLASH_API_KEY}
      FLASH_API_URL: ${FLASH_API_URL:-https://api.flashexpress.co.th}
      GBPAY_PUBLIC_KEY: ${GBPAY_PUBLIC_KEY:-mock}
      GBPAY_TOKEN: ${GBPAY_TOKEN:-mock}
      NAS_MEDIA_PATH: /nas/media
      NAS_BACKUP_PATH: /nas/backup
    volumes:
      - ${NAS_MEDIA_PATH:-./docker/media}:/nas/media
      - ${NAS_BACKUP_PATH:-./docker/backups}:/nas/backup
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eight_net

  # ─────────────────────────────────────────
  # BullMQ Worker (PDF, Notifications, Embedding)
  # ─────────────────────────────────────────
  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.worker
    container_name: eight_worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      NAS_MEDIA_PATH: /nas/media
    volumes:
      - ${NAS_MEDIA_PATH:-./docker/media}:/nas/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eight_net

  # ─────────────────────────────────────────
  # Next.js Frontend (Port 3000)
  # ─────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: eight_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:4000}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      LINE_CHANNEL_ID: ${LINE_CHANNEL_ID}
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET}
      NEXT_PUBLIC_LIFF_ID: ${NEXT_PUBLIC_LIFF_ID}
    depends_on:
      - api
    networks:
      - eight_net

  # ─────────────────────────────────────────
  # Nginx Reverse Proxy
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: eight_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${NAS_MEDIA_PATH:-./docker/media}:/usr/share/nginx/media:ro
    ports:
      - "80:80"
    depends_on:
      - web
      - api
    networks:
      - eight_net

  # ─────────────────────────────────────────
  # Cloudflare Tunnel (No port forwarding needed)
  # ─────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: eight_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    networks:
      - eight_net

# ─────────────────────────────────────────
# Volumes & Networks
# ─────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:

networks:
  eight_net:
    driver: bridge
